name: 采集板块涨跌幅 (同花顺标准行业)

on:
  schedule:
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 安装 akshare
        run: pip install akshare

      - name: 采集板块数据 (同花顺)
        run: |
          python -c "
          import akshare as ak, json, os, time, random
          from datetime import datetime, timezone, timedelta

          bj = timezone(timedelta(hours=8))
          now = datetime.now(bj)
          today = now.strftime('%Y-%m-%d')
          ts = now.strftime('%H:%M')

          if now.weekday() >= 5:
              print(f'[{ts}] Weekend skip')
              exit(0)
          t = now.time()
          if not ((9,25) <= (t.hour, t.minute) <= (11,30) or (13,0) <= (t.hour, t.minute) <= (15,5)):
              print(f'[{ts}] Out of hours skip')
              exit(0)

          time.sleep(random.uniform(0, 5))

          try:
              df = ak.stock_board_industry_summary_ths()
              cols = list(df.columns)
              sectors = []
              for _, row in df.iterrows():
                  sectors.append({
                      'rank': int(row[cols[0]]),
                      'name': row[cols[1]],
                      'change_pct': float(row[cols[2]]),
                      'up_count': int(row[cols[5]]),
                      'down_count': int(row[cols[7]]),
                      'leader': row[cols[9]],
                      'leader_change': float(row[cols[11]]) if row[cols[11]] != '-' else 0,
                  })

              filepath = f'data/sector_flow_{today}.json'
              existing = {'date': today, 'source': 'ths', 'snapshot_count': 0, 'snapshots': []}
              if os.path.exists(filepath):
                  with open(filepath, encoding='utf-8') as f:
                      existing = json.load(f)

              existing['snapshots'].append({'timestamp': ts, 'sectors': sectors})
              existing['snapshot_count'] = len(existing['snapshots'])

              os.makedirs('data', exist_ok=True)
              with open(filepath, 'w', encoding='utf-8') as f:
                  json.dump(existing, f, ensure_ascii=False)

              sorted_s = sorted(sectors, key=lambda s: s['change_pct'], reverse=True)
              print(f'[{ts}] {len(sectors)} sectors | {existing[\"snapshot_count\"]} snaps')
              print(f'Top: {sorted_s[0][\"name\"]}({sorted_s[0][\"change_pct\"]:+.2f}%) {sorted_s[1][\"name\"]}({sorted_s[1][\"change_pct\"]:+.2f}%) {sorted_s[2][\"name\"]}({sorted_s[2][\"change_pct\"]:+.2f}%)')
          except Exception as e:
              print(f'[ERROR] {e}')
              exit(0)
          "

      - name: 提交数据
        run: |
          if [ -d data ] && [ "$(ls -A data 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git diff --staged --quiet || (git commit -m "data: $(TZ='Asia/Shanghai' date +%Y-%m-%d)" && git push)
          fi
