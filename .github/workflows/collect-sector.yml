name: 采集板块涨跌幅 (东财标准行业)

on:
  schedule:
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 安装 akshare
        run: pip install akshare

      - name: 采集板块数据 (东财标准行业)
        run: |
          python -c "
          import akshare as ak, json, os, time, random
          from datetime import datetime, timezone, timedelta

          bj = timezone(timedelta(hours=8))
          now = datetime.now(bj)
          today = now.strftime('%Y-%m-%d')
          ts = now.strftime('%H:%M')

          if now.weekday() >= 5:
              print(f'[{ts}] Weekend, skip')
              exit(0)

          t = now.time()
          if not ((9,25) <= (t.hour, t.minute) <= (11,30) or (13,0) <= (t.hour, t.minute) <= (15,5)):
              print(f'[{ts}] Outside trading hours, skip')
              exit(0)

          # Random jitter to avoid fixed-interval patterns
          time.sleep(random.uniform(0, 5))

          try:
              df = ak.stock_board_industry_name_em()
              source = 'eastmoney'
              df = df.sort_values('涨跌幅', ascending=False)
              sectors = []
              for _, row in df.iterrows():
                  sectors.append({
                      'rank': len(sectors) + 1,
                      'name': row['板块名称'],
                      'code': row['板块代码'],
                      'change_pct': float(row['涨跌幅']),
                      'up_count': int(row['上涨家数']),
                      'down_count': int(row['下跌家数']),
                      'leader': row.get('领涨股', ''),
                      'leader_change': float(row.get('领涨股-涨跌幅', 0) or 0),
                  })

              filepath = f'data/sector_flow_{today}.json'
              existing = {'date': today, 'source': source, 'snapshot_count': 0, 'snapshots': []}
              if os.path.exists(filepath):
                  with open(filepath, encoding='utf-8') as f:
                      existing = json.load(f)

              existing['snapshots'].append({'timestamp': ts, 'sectors': sectors})
              existing['snapshot_count'] = len(existing['snapshots'])
              existing['source'] = source

              os.makedirs('data', exist_ok=True)
              with open(filepath, 'w', encoding='utf-8') as f:
                  json.dump(existing, f, ensure_ascii=False)

              top3 = sorted(sectors, key=lambda s: s['change_pct'], reverse=True)[:3]
              print(f'[{ts}] {len(sectors)}板块 | {len(existing[\"snapshots\"])}个快照')
              print(f'Top: {top3[0][\"name\"]}({top3[0][\"change_pct\"]:+.2f}%) {top3[1][\"name\"]}({top3[1][\"change_pct\"]:+.2f}%) {top3[2][\"name\"]}({top3[2][\"change_pct\"]:+.2f}%)')
          except Exception as e:
              print(f'[ERROR] Eastmoney blocked from GitHub: {e}')
              print(f'[FALLBACK] Will use local Windows scheduled task instead')
              exit(0)  # Don't fail the workflow, just skip
          "

      - name: 提交数据
        run: |
          if [ -d data ] && [ "$(ls -A data 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git diff --staged --quiet || (git commit -m "data: $(TZ='Asia/Shanghai' date +%Y-%m-%d)" && git push)
          else
            echo "无数据，跳过提交"
          fi
